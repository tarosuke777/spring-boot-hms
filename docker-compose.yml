name: hms

services:
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: tester
    # command: ./gradlew test
    # volumes:
    #   - .:/app

  hms-ap:
    image: hms:1.0
    container_name: hms-ap
    build:
      context: .
      dockerfile: Dockerfile
      target: final-build
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mariadb://home-db-mariadb:3306/hms
    secrets:
      - mysql_user_password
    networks:
      - home_network
    restart: always
secrets:
  mysql_root_password:
    file: C:\\dev\\secrets\\mysql_root_password.txt
  mysql_user_password:
    file: C:\\dev\\secrets\\mysql_hms_user_password.txt

networks:
  home_network:
    external: true
