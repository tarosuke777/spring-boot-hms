spring:
  config:
    import: optional:configtree:/run/secrets/
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:13306/hms}
    driver-class-name: org.mariadb.jdbc.Driver
    username: hms
    password: ${mysql_user_password:hms-password2}
  flyway:
    locations: classpath:db/migration/ddl
    baseline-on-migrate: true
    baseline-version: 0
  h2:
    console:
      enabled: false
  ai:
    vector-store:
      mariadb:
        initialize-schema: true

