<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/layout}"
>
  <head>
    <title>Author</title>
  </head>

  <body>
    <div layout:fragment="content">
      <div class="mt-3 mb-3 border-bottom">
        <h1 class="h2">Author</h1>
      </div>
      <div>
        <div class="mb-2">
          <a class="btn btn-dark" th:href="@{'/author/register'}">Register</a>
        </div>

        <nav th:if="${authorPage.totalPages > 1}" aria-label="Page navigation">
          <ul class="pagination">
            <li
              class="page-item"
              th:classappend="${authorPage.first} ? 'disabled'"
            >
              <a
                class="page-link"
                th:href="@{/author/list(page=${authorPage.number - 1})}"
                >&laquo;</a
              >
            </li>

            <li
              class="page-item"
              th:each="i : ${#numbers.sequence(0, authorPage.totalPages - 1)}"
              th:classappend="${i == authorPage.number} ? 'active'"
            >
              <a
                class="page-link"
                th:href="@{/author/list(page=${i})}"
                th:text="${i + 1}"
                >1</a
              >
            </li>

            <li
              class="page-item"
              th:classappend="${authorPage.last} ? 'disabled'"
            >
              <a
                class="page-link"
                th:href="@{/author/list(page=${authorPage.number + 1})}"
                >&raquo;</a
              >
            </li>
          </ul>
        </nav>

        <table class="table table-bordered table-hover align-middle">
          <thead>
            <tr class="table-dark">
              <th>Name</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="author: ${authorPage.content}">
              <td th:text="${author.name}"></td>
              <td>
                <a
                  class="btn btn-dark"
                  th:href="@{'/author/detail/' + ${author.id}}"
                  >Detail</a
                >
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
