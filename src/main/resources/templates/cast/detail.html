<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/layout}"
>
  <head>
    <title>CastDetail</title>
    <th:block layout:fragment="page-scripts">
      <script type="module" th:src="@{/js/common/modal.js}"></script>
    </th:block>
  </head>

  <body>
    <div layout:fragment="content">
      <div class="mt-3 mb-3 border-bottom">
        <h1 class="h2">Cast Detail</h1>
      </div>
      <form method="post" th:action="@{/cast/detail}" th:object="${castForm}">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{version}" />
        <div class="mb-3 row">
          <label for="name" class="col-sm-2 col-form-label">Name</label>
          <div class="col-sm-10">
            <input
              type="text"
              class="form-control"
              th:field="*{name}"
              th:errorclass="is-invalid"
            />
            <div class="invalid-feedback" th:errors="*{name}"></div>
          </div>
        </div>
        <div class="mb-3 row">
          <label for="link" class="col-sm-2 col-form-label">Link</label>
          <div class="col-sm-10">
            <input
              type="text"
              class="form-control"
              th:field="*{link}"
              th:errorclass="is-invalid"
            />
            <div class="invalid-feedback" th:errors="*{link}"></div>
          </div>
        </div>
        <div class="text-center">
          <button class="btn btn-danger" type="submit" name="delete">
            Delete
          </button>
          <button class="btn btn-dark" type="submit" name="update">
            Update
          </button>
        </div>
      </form>

      <div class="mt-5 mb-3 border-bottom">
        <h2 class="h4">Related Movies</h2>
      </div>
      <div th:if="${movies.isEmpty()}">
        <p class="text-muted">この Cast に紐づく Movie はありません</p>
      </div>
      <div th:unless="${movies.isEmpty()}">
        <table class="table table-bordered table-hover align-middle">
          <thead>
            <tr class="table-dark">
              <th>Name</th>
              <th>Link</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="movie: ${movies}">
              <td th:text="${movie.name}"></td>
              <td class="text-center">
                <a
                  th:if="${not #strings.isEmpty(movie.link)}"
                  th:href="${movie.link}"
                  target="_blank"
                  class="btn btn-sm btn-link"
                  >Link</a
                >
                <span th:unless="${not #strings.isEmpty(movie.link)}">-</span>
              </td>
              <td
                class="text-truncate modal-trigger"
                style="max-width: 200px; cursor: pointer"
                data-bs-toggle="modal"
                data-bs-target="#globalModal"
                th:if="${not #strings.isEmpty(movie.note)}"
                th:data-modal-text="${movie.note}"
                data-modal-title="Note"
              >
                <span th:text="${movie.note}"></span>
              </td>
              <td th:unless="${not #strings.isEmpty(movie.note)}">-</td>
            </tr>
          </tbody>
        </table>
      </div>
      <th:block th:replace="~{parts/parts :: globalModal }"></th:block>
    </div>
  </body>
</html>
