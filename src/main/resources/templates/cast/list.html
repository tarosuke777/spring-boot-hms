<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/layout}">

<head>
    <title>Cast</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="mt-3 mb-3 border-bottom">
            <h1 class="h2">Cast</h1>
        </div>
        <div>
            <div class="mb-2">
                <a class="btn btn-dark" th:href="@{'/cast/register'}">Register</a>
            </div>
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr class="table-dark">
                        <th>Name</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cast: ${castList}">
                        <td th:text="${cast.name}"></td>
                        <td><a class="btn btn-dark" th:href="@{'/cast/detail/' + ${cast.id}}">Detail</a>
                        </td>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
