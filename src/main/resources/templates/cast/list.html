<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/layout}"
>
  <head>
    <title>Cast</title>
  </head>

  <body>
    <div layout:fragment="content">
      <div class="mt-3 mb-3 border-bottom">
        <h1 class="h2">Cast</h1>
      </div>
      <div>
        <div class="mb-2">
          <a class="btn btn-dark" th:href="@{'/cast/register'}">Register</a>
        </div>

        <nav th:if="${castPage.totalPages > 1}" aria-label="Page navigation">
          <ul class="pagination">
            <li
              class="page-item"
              th:classappend="${castPage.first} ? 'disabled'"
            >
              <a
                class="page-link"
                th:href="@{/cast/list(page=${castPage.number - 1})}"
                >&laquo;</a
              >
            </li>

            <li
              class="page-item"
              th:each="i : ${#numbers.sequence(0, castPage.totalPages - 1)}"
              th:classappend="${i == castPage.number} ? 'active'"
            >
              <a
                class="page-link"
                th:href="@{/cast/list(page=${i})}"
                th:text="${i + 1}"
                >1</a
              >
            </li>

            <li
              class="page-item"
              th:classappend="${castPage.last} ? 'disabled'"
            >
              <a
                class="page-link"
                th:href="@{/cast/list(page=${castPage.number + 1})}"
                >&raquo;</a
              >
            </li>
          </ul>
        </nav>

        <table class="table table-bordered table-hover align-middle">
          <thead>
            <tr class="table-dark">
              <th>Name</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="cast: ${castPage.content}">
              <td th:text="${cast.name}"></td>
              <td>
                <a
                  class="btn btn-dark"
                  th:href="@{'/cast/detail/' + ${cast.id}}"
                  >Detail</a
                >
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
