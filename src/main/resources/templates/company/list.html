<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/layout}">

<head>
    <title>Company</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="mt-3 mb-3 border-bottom">
            <h1 class="h2">Company</h1>
        </div>
        <div class="row align-items-center mb-4 g-3">
            <div class="col-auto">
                <a class="btn btn-dark" th:href="@{'/company/register'}">Register</a>
            </div>

            <div class="col">
                <form th:action="@{/company/list}" method="get" class="row g-2 align-items-center">

                    <div class="col-auto">
                        <input type="text" class="form-control" name="name" placeholder="Name"
                            th:value="${name}" />
                    </div>

                    <div class="col-auto">
                        <button type="submit" class="btn btn-dark">検索</button>
                        <a th:href="@{/company/list}" class="btn btn-secondary">リセット</a>
                    </div>
                </form>
            </div>
        </div>

        <nav th:if="${companyPage.totalPages > 1}" aria-label="Page navigation">
            <ul class="pagination">

                <li class="page-item" th:classappend="${companyPage.first} ? 'disabled'">
                    <a class="page-link"
                        th:href="@{/company/list(page=${companyPage.number - 1}, name=${name})}">&laquo;</a>
                </li>

                <li class="page-item" th:each="i : ${#numbers.sequence(0, companyPage.totalPages - 1)}"
                    th:classappend="${i == companyPage.number} ? 'active'">
                    <a class="page-link"
                        th:href="@{/company/list(page=${i}, name=${name})}"
                        th:text="${i + 1}">1</a>
                </li>

                <li class="page-item" th:classappend="${companyPage.last} ? 'disabled'">
                    <a class="page-link"
                        th:href="@{/company/list(page=${companyPage.number + 1}, name=${name})}">&raquo;</a>
                </li>

            </ul>
        </nav>

        <div>
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr class="table-dark">
                        <th>Name</th>
                        <th>Note</th>
                        <th>Job Application History</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="company: ${companyPage.content}">
                        <td th:text="${company.name}"></td>
                        <td style="max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                            th:text="${company.note}"></td>
                        <td style="max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                            th:text="${company.jobApplicationHistory}"></td>
                        <td><a class="btn btn-dark" th:href="@{'/company/detail/' + ${company.id}}">Detail</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
