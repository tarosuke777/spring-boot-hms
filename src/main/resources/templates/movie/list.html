<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/layout}"
>
  <head>
    <title>Movie</title>
  </head>

  <body>
    <div layout:fragment="content">
      <div class="mt-3 mb-3 border-bottom">
        <h1 class="h2">Movie</h1>
      </div>
      <div>
        <div class="mb-2">
          <a class="btn btn-dark" th:href="@{'/movie/register'}">Register</a>
        </div>

        <nav th:if="${moviePage.totalPages > 1}" aria-label="Page navigation">
          <ul class="pagination">
            <li
              class="page-item"
              th:classappend="${moviePage.first} ? 'disabled'"
            >
              <a
                class="page-link"
                th:href="@{/movie/list(page=${moviePage.number - 1})}"
                >&laquo;</a
              >
            </li>

            <li
              class="page-item"
              th:each="i : ${#numbers.sequence(0, moviePage.totalPages - 1)}"
              th:classappend="${i == moviePage.number} ? 'active'"
            >
              <a
                class="page-link"
                th:href="@{/movie/list(page=${i})}"
                th:text="${i + 1}"
                >1</a
              >
            </li>

            <li
              class="page-item"
              th:classappend="${moviePage.last} ? 'disabled'"
            >
              <a
                class="page-link"
                th:href="@{/movie/list(page=${moviePage.number + 1})}"
                >&raquo;</a
              >
            </li>
          </ul>
        </nav>

        <table class="table table-bordered table-hover align-middle">
          <thead>
            <tr class="table-dark">
              <th>Genre</th>
              <th>Movie Name</th>
              <th>Cast</th>
              <th>Link</th>
              <th>Note</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="movie: ${moviePage.content}">
              <td th:text="${movie.genre.label}"></td>
              <td>
                <span th:text="${movie.name}"></span>
                <span th:if="${movie.isAdult}" class="badge bg-danger ms-1"
                  >18+</span
                >
              </td>
              <td
                th:text="${movie.castId != null ? castMap.get(movie.castId) : ''}"
              ></td>
              <td class="text-center">
                <a
                  th:if="${not #strings.isEmpty(movie.link)}"
                  th:href="${movie.link}"
                  target="_blank"
                  class="btn btn-sm btn-link"
                  >Link</a
                >
                <span th:unless="${not #strings.isEmpty(movie.link)}">-</span>
              </td>
              <td style="white-space: pre-line" th:text="${movie.note}"></td>
              <td>
                <a
                  class="btn btn-dark"
                  th:href="@{'/movie/detail/' + ${movie.id}}"
                  >Detail</a
                >
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
