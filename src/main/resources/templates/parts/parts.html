<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Parts</title>
  </head>

  <body>
    <select
      th:fragment="commonSelect(selectMap, selectedKey, fieldName, hasBlank)"
      class="form-select"
      th:field="*{__${fieldName}__}"
      th:errorclass="is-invalid"
    >
      <option th:if="${hasBlank}" value=""></option>
      <option
        th:each="item : ${selectMap}"
        th:value="${item.key}"
        th:text="${item.value}"
        th:selected="${item.key == selectedKey}"
      ></option>
    </select>

    <select
      th:fragment="trainingMenu(selectList, selectedKey, fieldName, hasBlank)"
      class="form-select"
      th:field="*{__${fieldName}__}"
    >
      <option th:if="${hasBlank}" value=""></option>
      <option
        th:each="item : ${selectList}"
        th:value="${item.key}"
        th:data-parent-key="${item.parentKey}"
        th:data-max-weight="${item.maxWeight}"
        th:data-max-reps="${item.maxReps}"
        th:data-max-sets="${item.maxSets}"
        th:text="${item.value}"
        th:selected="${item.key == selectedKey}"
      ></option>
    </select>

    <div
      th:fragment="globalModal"
      class="modal fade"
      id="globalModal"
      tabindex="-1"
      aria-labelledby="globalModalTitle"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="globalModalTitle">詳細</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p id="globalModalBody" style="white-space: pre-line"></p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              閉じる
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
