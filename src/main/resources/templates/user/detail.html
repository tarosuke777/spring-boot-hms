<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}">

<head>
	<title>UserDetail</title>
</head>

<body>
	<div layout:fragment="content">
		<div class="mt-3 mb-3 border-bottom">
			<h1 class="h2">User Detail</h1>
		</div>
		<form method="post" th:action="@{/user/detail}" th:object="${userForm}">
			<input type="hidden" th:field="*{id}">
			<input type="hidden" th:field="*{version}" />
			<div class="mb-3 row">
				<label for="name" class="col-sm-2 col-form-label">Name</label>
				<div class="col-sm-10">
					<input type="text" class="form-control" th:field="*{name}" th:errorclass="is-invalid">
					<div class="invalid-feedback" th:errors="*{name}"></div>
				</div>
			</div>
			<div class="mb-3 row">
				<label for="password" class="col-sm-2 col-form-label">Password</label>
				<div class="col-sm-10">
					<input type="text" class="form-control" th:field="*{password}" th:errorclass="is-invalid">
					<div class="invalid-feedback" th:errors="*{password}"></div>
				</div>
			</div>
			<div class="mb-3 row">
				<label for="role" class="col-sm-2 col-form-label">Role</label>
				<div class="col-sm-10">
					<select class="form-control" th:field="*{role}">
						<option th:each="r : ${T(com.tarosuke777.hms.enums.Role).values()}" th:value="${r.name()}"
							th:text="${r.displayName}">Role</option>
					</select>
				</div>
			</div>
			<div class="text-center">
				<button class="btn btn-danger" type="submit" name="delete">
					Delete</button>
				<button class="btn btn-dark" type="submit" name="update">
					Update</button>
			</div>
		</form>
	</div>
</body>

</html>
